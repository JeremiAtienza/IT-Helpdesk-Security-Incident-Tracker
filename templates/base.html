<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureDesk Tracker | Secure Incident & Desk Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: radial-gradient(circle at top left, rgba(38, 132, 255, 0.16), transparent 32%),
                        linear-gradient(180deg, #f6f9ff 0%, #eef5fb 100%);
            color: #1e2a3b;
        }
        .navbar { background: linear-gradient(90deg, #0d6efd 0%, #3f78ff 100%); }
        .navbar-brand {
            font-weight: 800;
            letter-spacing: 0.08em;
            color: #ffffff !important;
        }
        .card {
            border: 0;
            border-radius: 1rem;
            background: #ffffff;
        }
        .card-shadow { box-shadow: 0 22px 50px rgba(15, 35, 71, 0.10); }
        .page-section { padding: 3rem 0; }
        .hero-title { letter-spacing: -0.04em; font-weight: 700; }
        .text-muted { color: #6c7a89 !important; }
        .btn-primary {
            background-color: #1f6fff;
            border-color: #1f6fff;
        }
        .btn-primary:hover {
            background-color: #175ed6;
            border-color: #175ed6;
        }
        .form-control:focus {
            box-shadow: 0 0 0 0.25rem rgba(56, 111, 255, 0.20);
        }
        .bg-dark { background-color: #0d47a1 !important; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="{% url 'file-list' %}">🔒 SecureDesk Tracker</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMenu" aria-controls="navbarMenu" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarMenu">
                <ul class="navbar-nav ms-auto align-items-center">
                    {% if user.is_authenticated %}
                        <li class="nav-item me-2"><a href="{% url 'file-list' %}" class="nav-link">Vault</a></li>
                        <li class="nav-item me-2"><a href="{% url 'help-ticket-list' %}" class="nav-link">Incidents</a></li>
                        <li class="nav-item me-2"><a href="{% url 'knowledgebase-list' %}" class="nav-link">Knowledge Base</a></li>
                        {% if user.is_staff %}
                            <li class="nav-item me-2"><a href="{% url 'admin-dashboard' %}" class="nav-link">Admin</a></li>
                        {% endif %}
                        <li class="nav-item ms-3">
                            <form method="POST" action="{% url 'logout' %}">
                                {% csrf_token %}
                                <button type="submit" class="btn btn-outline-light btn-sm">Log Out</button>
                            </form>
                        </li>
                    {% else %}
                        <li class="nav-item me-2"><a href="{% url 'two_factor:login' %}" class="btn btn-outline-light btn-sm">Log In</a></li>
                        <li class="nav-item"><a href="{% url 'signup' %}" class="btn btn-primary btn-sm">Sign Up</a></li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    <main class="container page-section">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
