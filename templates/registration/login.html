{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow border-0 rounded-4">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-dark">Welcome Back to SecureDesk Tracker</h2>
                    <p class="text-muted">Secure access to your incident desk and file tracker.</p>
                </div>
                <form method="POST">
                    {% csrf_token %}
                    
                    {% for field in form %}
                        <div class="mb-4">
                            <label class="form-label fw-bold text-secondary">{{ field.label }}</label>
                            {{ field }}
                            {% for error in field.errors %}
                                <div class="text-danger small mt-1">{{ error }}</div>
                            {% endfor %}
                        </div>
                    {% endfor %}
                    
                    <div class="d-grid mt-5">
                        <button type="submit" class="btn btn-dark btn-lg rounded-3">Secure Login</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
