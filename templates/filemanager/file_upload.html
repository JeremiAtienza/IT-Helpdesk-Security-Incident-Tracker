{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-0 mt-5">
            <div class="card-body p-5">
                <h3 class="card-title text-center mb-4">Upload to Vault</h3>
                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold text-secondary">File Title</label>
                        {{ form.title }}
                        <div class="form-text">{{ form.title.help_text }}</div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold text-secondary">Select Document</label>
                        {{ form.document }}
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-dark btn-lg">Secure Upload</button>
                        <a href="{% url 'file-list' %}" class="btn btn-link text-muted text-decoration-none">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
