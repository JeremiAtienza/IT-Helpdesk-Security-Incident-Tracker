{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card shadow-sm border-danger">
            <div class="card-body p-5 text-center">
                <h3 class="text-danger mb-4">Confirm Deletion</h3>
                <p class="fs-5">Are you sure you want to delete <strong>"{{ object.title }}"</strong>?</p>
                <p class="text-muted small mb-4">This action cannot be undone, and the file will be removed from your cloud storage.</p>
                
                <form method="POST">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-3">
                        <a href="{% url 'file-list' %}" class="btn btn-secondary px-4">Cancel</a>
                        <button type="submit" class="btn btn-danger px-4">Yes, Delete</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
